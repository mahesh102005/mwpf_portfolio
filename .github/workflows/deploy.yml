name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (runs on the GitHub runner, NOT on the EC2 box)
        run: pnpm run build

      - name: Add EC2 host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Setup SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > ec2_key.pem
          chmod 600 ec2_key.pem

      - name: Deploy dist/ to EC2 via rsync
        run: |
          rsync -avz --delete \
            -e "ssh -i ec2_key.pem -o StrictHostKeyChecking=no" \
            dist/ ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/var/www/mwpf-portfolio/

      - name: Reload Nginx
        run: |
          ssh -i ec2_key.pem -o StrictHostKeyChecking=no \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "sudo systemctl reload nginx"

      - name: Cleanup key
        if: always()
        run: rm -f ec2_key.pem